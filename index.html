<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mistrz Podróży</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#0b72ff,#00b7ff);
padding:40px;
text-align:center;
color:white;
}

.search-box{
width:80%;
max-width:900px;
margin:auto;
margin-top:-30px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

input,select{
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:12px 25px;
background:#0b72ff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}
</style>

</head>

<body>

<header>

<h1>✈️ Mistrz Podróży</h1>

<p>Znajdę najtańszy i najlepszy wyjazd dla Ciebie</p>

</header>

<div class="search-box">

<input placeholder="Np. 2 osoby z psem do 3000 zł">

<select>
<option>Polska</option>
<option>Zagranica</option>
</select>

<select>
<option>HB</option>
<option>All Inclusive</option>
</select>

<button>Znajdź mi wyjazd</button>

</div>

<div class="cards">

<div class="card">
<h2>🔥 Dzisiejsze okazje</h2>
<p>Najlepsze promocje dnia</p>
</div>

<div class="card">
<h2>✈️ Last Minute</h2>
<p>Tanie wyjazdy na teraz</p>
</div>

<div class="card">
<h2>💰 Najtańsze</h2>
<p>Najlepsze ceny</p>
</div>

</div>

</body>
</html>
