<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mistrz Podróży</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#0b72ff,#00b7ff);
padding:40px;
text-align:center;
color:white;
}

.box{
width:85%;
max-width:900px;
margin:30px auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#0b72ff;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.result{
display:none;
margin-top:20px;
padding:20px;
background:#f5f5f5;
border-radius:15px;
}

</style>
</head>

<body>

<header>

<h1>✈️ Mistrz Podróży</h1>

<p>Twój osobisty AI planujący podróże</p>

</header>


<div class="box">

<h2>🤖 Mój Plan AI</h2>

<input id="place"
placeholder="Dokąd jedziesz?">

<input id="days"
placeholder="Ile dni?">

<select id="transport">

<option>Auto</option>
<option>Bez auta</option>

</select>

<select id="interest">

<option>Góry</option>
<option>Zwiedzanie</option>
<option>Jedzenie</option>
<option>Nocne atrakcje</option>

</select>

<button onclick="generatePlan()">

Ułóż mój plan

</button>


<div class="result" id="result"></div>

</div>


<script>

function generatePlan(){

let place=document
.getElementById("place").value;

let days=document
.getElementById("days").value;

let interest=document
.getElementById("interest").value;

let result=document
.getElementById("result");

let plan="";

if(interest=="Góry"){

plan=`

<h3>Dzień 1</h3>

<p>08:30 Śniadanie</p>

<p>10:00 Szlak górski</p>

<p>13:00 Schronisko</p>

<p>16:00 Punkt widokowy</p>

<p>20:00 Zachód słońca</p>

`;

}

else if(interest=="Jedzenie"){

plan=`

<h3>Dzień 1</h3>

<p>09:00 Śniadanie regionalne</p>

<p>12:00 Lokalna restauracja</p>

<p>15:00 Kawiarnia</p>

<p>19:00 Kolacja regionalna</p>

`;

}

else if(interest=="Nocne atrakcje"){

plan=`

<h3>Dzień 1</h3>

<p>10:00 Zwiedzanie</p>

<p>18:00 Kolacja</p>

<p>21:00 Punkt widokowy nocą</p>

<p>23:00 Spacer po mieście</p>

`;

}

else{

plan=`

<h3>Dzień 1</h3>

<p>09:00 Zwiedzanie atrakcji</p>

<p>12:00 Muzeum</p>

<p>15:00 Zamek</p>

<p>20:00 Wieczorny spacer</p>

`;

}

result.innerHTML=`

<h2>📍 ${place}</h2>

${plan}

<p>📅 Długość pobytu: ${days} dni</p>

`;

result.style.display="block";

}

let place=document
.getElementById("place").value;

let days=document
.getElementById("days").value;

let interest=document
.getElementById("interest").value;

let result=document
.getElementById("result");


result.innerHTML=`

<h2>📍 ${place}</h2>

<h3>Dzień 1</h3>

<p>09:00 Śniadanie</p>

<p>10:30 ${interest}</p>

<p>13:00 Regionalny obiad</p>

<p>16:00 Atrakcje</p>

<p>20:00 Wieczorny spacer</p>

<p>📅 Długość pobytu: ${days} dni</p>

`;

result.style.display="block";

}

</script>

</body>
</html>
