<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mistrz Podróży AI</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="box">

<h1>🤖 Mistrz Podróży AI</h1>

<input
id="place"
placeholder="Dokąd jedziesz?">

<input
id="days"
type="number"
placeholder="Ile dni?">

<select id="transport">

<option value="Samochód">
🚗 Samochód
</option>

<option value="Pociąg">
🚆 Pociąg
</option>

<option value="Rower">
🚲 Rower
</option>

<option value="Samolot">
✈️ Samolot
</option>

</select>
  
<select id="interest">

<option>Góry</option>
<option>Zwiedzanie</option>
<option>Jedzenie</option>
<option>Nocne atrakcje</option>

</select>

<button id="btn">

Ułóż mój plan

</button>

<div id="result"></div>

<hr>

<h2>🚗 Inteligentna Trasa</h2>

<input
id="from"
placeholder="Skąd?">

<input
id="to"
placeholder="Dokąd?">
<div class="preferences">

<h3>✅ Chcę po drodze</h3>

<label class="check">
<input type="checkbox" id="castles">
🏰 Zamki
</label>

<label class="check">
<input type="checkbox" id="views">
🌲 Widoki
</label>

<label class="check">
<input type="checkbox" id="food">
🍽 Jedzenie
</label>

<h3>❌ Nie chcę</h3>

<label class="check">
<input type="checkbox" id="expensive">
💰 Płatnych atrakcji
</label>

<label class="check">
<input type="checkbox" id="longStops">
⏱ Długich postojów
</label>

<label class="check">
<input type="checkbox" id="cities">
🏙 Dużych miast
</label> 

</div>
  
<button id="routeBtn">

Zaplanuj trasę

</button>

<div id="routeResult"></div>

</div>

<script src="data.js"></script>
<script src="routeData.js"></script>
<script src="script.js"></script>

<hr>

<h2>❤️ Moje Ulubione</h2>

<button id="showFavoritesBtn">

Pokaż ulubione

</button>

<div id="favoritesResult"></div>  
  
</body>
</html>
