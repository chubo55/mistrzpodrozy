<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistrz Podróży</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f7fb;
text-align:center;
}

header{
padding:40px;
background:#0b72ff;
color:white;
}

.box{
margin:40px auto;
width:80%;
max-width:600px;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.1);
}

input{
width:90%;
padding:15px;
margin:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:15px 30px;
background:#0b72ff;
color:white;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>✈️ Mistrz Podróży</h1>
<p>Znajdę najtańszy i najlepszy wyjazd dla Ciebie</p>
</header>

<div class="box">
<input placeholder="Np. 2 osoby z psem do 3000 zł">
<br>
<button>Znajdź mi wyjazd</button>
</div>

</body>
</html>
