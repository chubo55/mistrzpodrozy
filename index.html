<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mistrz Podróży AI</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#0b72ff,#00b7ff);
padding:30px;
text-align:center;
color:white;
}

.container{
width:85%;
max-width:900px;
margin:30px auto;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,button{

width:100%;
padding:15px;
margin-top:12px;
border-radius:10px;
border:1px solid #ddd;
box-sizing:border-box;

}

button{

background:#0b72ff;
color:white;
border:none;
cursor:pointer;

}

#result{

display:none;
margin-top:20px;
padding:20px;
background:#f5f5f5;
border-radius:15px;

}

</style>

</head>

<body>

<header>

<h1>✈️ Mistrz Podróży</h1>

<p>Twój osobisty AI planujący podróże</p>

</header>


<div class="container">

<div class="card">

<h2>🤖 Mój Plan AI</h2>

<input
id="place"
placeholder="Dokąd jedziesz?">

<input
id="days"
placeholder="Ile dni?">

<select id="interest">

<option>Góry</option>
<option>Zwiedzanie</option>
<option>Jedzenie</option>
<option>Nocne atrakcje</option>

</select>

<button id="planButton">

Ułóż mój plan

</button>


<div id="result"></div>

</div>

</div>


<script>

document
.getElementById("planButton")
.addEventListener("click", function(){

const place=
document.getElementById("place").value;

const days=
document.getElementById("days").value;

const interest=
document.getElementById("interest").value;

const result=
document.getElementById("result");

let plan="";

if(interest==="Góry"){

plan=`
🏔 Dzień 1<br><br>

08:30 Śniadanie<br>
10:00 Szlak górski<br>
13:00 Schronisko<br>
16:00 Punkt widokowy<br>
20:00 Zachód słońca
`;

}

else if(interest==="Jedzenie"){

plan=`
🍽 Dzień 1<br><br>

09:00 Regionalne śniadanie<br>
12:00 Restauracja<br>
15:00 Kawiarnia<br>
19:00 Kolacja
`;

}

else if(interest==="Nocne atrakcje"){

plan=`
🌙 Dzień 1<br><br>

18:00 Kolacja<br>
21:00 Punkt widokowy<br>
23:00 Spacer nocny
`;

}

else{

plan=`
🏰 Dzień 1<br><br>

09:00 Zwiedzanie<br>
12:00 Muzeum<br>
15:00 Atrakcje<br>
20:00 Spacer
`;

}

result.innerHTML=`

<h2>📍 ${place || "Wybrana lokalizacja"}</h2>

<p>📅 ${days || "1"} dni</p>

${plan}

`;

result.style.display="block";

});

</script>

</body>
</html>
