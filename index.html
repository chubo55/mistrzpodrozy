<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mistrz Podróży</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#0b72ff,#00b7ff);
padding:40px;
text-align:center;
color:white;
}

.search-box{
width:80%;
max-width:900px;
margin:auto;
margin-top:-30px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

input,select{
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:12px 25px;
background:#0b72ff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.result{
width:80%;
max-width:900px;
margin:30px auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
display:none;
}
</style>
</head>

<body>

<header>
<h1>✈️ Mistrz Podróży</h1>
<p>Znajdę najtańszy i najlepszy wyjazd dla Ciebie</p>
</header>

<div class="search-box">

<input id="tripInput"
placeholder="Np. 2 osoby z psem do 3000 zł">

<br>

<select>
<option>Polska</option>
<option>Zagranica</option>
</select>

<select>
<option>HB</option>
<option>All Inclusive</option>
</select>

<br>

<button onclick="searchTrip()">
Znajdź mi wyjazd
</button>

</div>

<div class="result" id="result">

<h2>🏖 Kreta</h2>

<p>💰 Cena: 2599 zł</p>

<p>✈️ Lot + Hotel + HB</p>

<p>⭐ Ocena AI: 9/10</p>

</div>


<script>

function searchTrip(){

document.getElementById("result")
.style.display="block";

}

</script>

</body>
</html>
