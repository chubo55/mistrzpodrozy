<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mistrz Podróży</title>

<style>
body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:20px;
max-width:800px;
margin:auto;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
}

.day{
background:#f3f3f3;
padding:15px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>🤖 Mój Plan AI</h1>

<input id="place" placeholder="Dokąd jedziesz?">

<input id="days" type="number" placeholder="Ile dni?">

<select id="interest">
<option>Góry</option>
<option>Zwiedzanie</option>
<option>Jedzenie</option>
<option>Nocne atrakcje</option>
</select>

<button id="btn">
Ułóż mój plan
</button>

<div id="result"></div>

</div>

<script>

const btn=document.getElementById("btn");

btn.onclick=function(){

const place=document.getElementById("place").value;

const days=parseInt(
document.getElementById("days").value
)||1;

const interest=
document.getElementById("interest").value;

let html="<h2>"+place+"</h2>";

for(let i=1;i<=days;i++){

html+="<div class='day'>";

html+="<h3>Dzień "+i+"</h3>";

if(interest==="Góry"){

html+="🥾 Szlak<br>";
html+="🏔 Punkt widokowy<br>";
html+="🍲 Schronisko";

}

else if(interest==="Jedzenie"){

html+="🍽 Restauracja<br>";
html+="☕ Kawiarnia<br>";
html+="🍷 Kolacja";

}

else if(interest==="Nocne atrakcje"){

html+="🌙 Spacer nocny<br>";
html+="📸 Zdjęcia";

}

else{

html+="🏰 Zwiedzanie<br>";
html+="🖼 Muzeum";

}

html+="</div>";

}

document.getElementById("result").innerHTML=html;

}

</script>

</body>
</html>
