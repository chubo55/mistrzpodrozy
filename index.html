<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mistrz Podróży AI</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

.container{
width:90%;
max-width:900px;
margin:30px auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:1px solid #ddd;
box-sizing:border-box;
}

button{
background:#0b72ff;
color:white;
border:none;
cursor:pointer;
}

.day{
background:#f5f5f5;
padding:15px;
margin-top:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Mój Plan AI</h1>

<input
id="place"
placeholder="Dokąd jedziesz?">

<input
id="days"
type="number"
placeholder="Ile dni?">

<select id="interest">

<option>Góry</option>
<option>Zwiedzanie</option>
<option>Jedzenie</option>
<option>Nocne atrakcje</option>

</select>

<button id="btn">

Ułóż mój plan

</button>

<div id="result"></div>

</div>

<script>

document
.getElementById("btn")
.addEventListener("click",generatePlan);


function generatePlan(){

const place=
document.getElementById("place").value;

const days=
Number(
document.getElementById("days").value
);

const interest=
document.getElementById("interest").value;

let html=`

<h2>📍 ${place}</h2>

<p>📅 ${days} dni</p>

`;

for(let i=1;i<=days;i++){

let activity="";

if(interest==="Góry"){

activity=`
08:30 Śniadanie<br>
10:00 Szlak górski<br>
13:00 Schronisko<br>
16:00 Punkt widokowy<br>
20:00 Zachód słońca
`;

}

else if(interest==="Jedzenie"){

activity=`
09:00 Regionalne śniadanie<br>
12:00 Restauracja<br>
15:00 Kawiarnia<br>
19:00 Kolacja
`;

}

else if(interest==="Nocne atrakcje"){

activity=`
18:00 Kolacja<br>
21:00 Punkt widokowy<br>
23:00 Spacer nocny
`;

}

else{

activity=`
09:00 Zwiedzanie<br>
12:00 Muzeum<br>
15:00 Atrakcje
`;

}

html += `

<div class="day">

<h3>📅 Dzień ${i}</h3>

${activity}

</div>

`;

}

document
.getElementById("result")
.innerHTML=html;

}

</script>

</body>
</html>
