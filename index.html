<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mistrz Podróży AI</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:linear-gradient(90deg,#0b72ff,#00b7ff);
padding:30px;
text-align:center;
color:white;
}

.container{
width:85%;
max-width:900px;
margin:30px auto;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:15px;
margin-top:12px;
border-radius:10px;
border:1px solid #ddd;
box-sizing:border-box;
}

button{
background:#0b72ff;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

.day{
margin-top:15px;
padding:15px;
background:#f7f7f7;
border-radius:12px;
}

#result{
display:none;
margin-top:20px;
}

</style>
</head>

<body>

<header>

<h1>✈️ Mistrz Podróży</h1>
<p>Twój osobisty AI planujący podróże</p>

</header>


<div class="container">

<div class="card">

<h2>🤖 Mój Plan AI</h2>

<input
id="place"
placeholder="Dokąd jedziesz?">

<input
id="days"
type="number"
placeholder="Ile dni?">

<select id="interest">

<option>Góry</option>
<option>Zwiedzanie</option>
<option>Jedzenie</option>
<option>Nocne atrakcje</option>

</select>

<button id="planButton">

Ułóż mój plan

</button>

<div id="result"></div>

</div>

</div>


<script>

document
.getElementById("planButton")
.addEventListener("click",generatePlan);

function generatePlan(){

const place=
document.getElementById("place").value;

const days=
parseInt(
document.getElementById("days").value
);

const interest=
document.getElementById("interest").value;

const result=
document.getElementById("result");

let fullPlan="";

for(let i=1;i<=days;i++){

let activities="";

if(interest==="Góry"){

activities=`
🥾 Szlak górski<br>
🏔 Punkt widokowy<br>
🍲 Schronisko<br>
🌅 Zachód słońca
`;

}

else if(interest==="Jedzenie"){

activities=`
🍽 Regionalne śniadanie<br>
🥘 Lokalna restauracja<br>
☕ Kawiarnia<br>
🍷 Kolacja
`;

}

else if(interest==="Nocne atrakcje"){

activities=`
🌇 Spacer wieczorny<br>
🌙 Punkt widokowy<br>
📸 Nocne zdjęcia
`;

}

else{

activities=`
🏰 Zwiedzanie<br>
🖼 Muzeum<br>
📍 Atrakcje miasta
`;

}

fullPlan += `

<div class="day">

<h3>📅 Dzień ${i}</h3>

<p>

08:30 Śniadanie<br><br>

${activities}

</p>

</div>

`;

}

result.innerHTML=`

<h2>📍 ${place || "Wybrana lokalizacja"}</h2>

<p>

Plan na ${days} dni

</p>

${fullPlan}

`;

result.style.display="block";

}

</script>

</body>
</html>
